
name: Go Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod tidy
      - name: Build
        run: go build -o yr
      - name: Test
        run: go test 

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yoru
          path: yr
          retention-days: 7











































